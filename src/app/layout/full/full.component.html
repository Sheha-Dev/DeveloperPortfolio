<mat-card class="m-0 p-0 app-container">
  <mat-card-content>
    <div class="header-row">
      <div class="headerTitle">
        <h1>Dev Shehan</h1>
      </div>

      <app-menu-bar (tabName)="selectedTab = $event"></app-menu-bar>
    </div>



    <div class="w-100 p-400">
      <div *ngIf="screenWidth < 768">
               <h3>{{selectedTab}}</h3> 
      </div>

      <div *ngIf="selectedTab === 'Home'">
        <app-home></app-home>
      </div>

      <div *ngIf="selectedTab === 'Education'">
        <app-education></app-education>
      </div>

      <div *ngIf="selectedTab === 'Projects'">
        <app-projects></app-projects>
      </div>

      <div *ngIf="selectedTab === 'Experience'">
        <app-experince></app-experince>
      </div>

      <div *ngIf="selectedTab === 'Contact'">
        <app-contact></app-contact>
      </div>
    </div>
  </mat-card-content>
</mat-card>
