<form [formGroup]="projectForm">
  <div formArrayName="projects">
    <mat-expansion-panel
      *ngFor="let project of projects.controls; let i = index"
      [formGroupName]="i"
      [expanded]="openedPanel === i"
      (opened)="openedPanel = i"
    >
      <mat-expansion-panel-header>
        <mat-panel-title>
          {{ project.get("title")?.value }}
        </mat-panel-title>

        <mat-panel-description>
          {{ project.get("duration")?.value }}
        </mat-panel-description>
      </mat-expansion-panel-header>

      <div class="row project-content">
        <!-- Carousel -->
        <div class="col-xl-6 col-lg-12 project-carousel border border-3 rounded p-3">
          <ng-container *ngIf="project.get('images')?.value?.length > 0; else noImages">
            <button type="button" class="nav-btn" (click)="prevImage(i)">
              ❮
            </button>

            <img
              class="clickable-image"
              [src]="project.get('images')?.value[project.get('currentImageIndex')?.value]"
              [alt]="project.get('title')?.value"
              (click)="openImagePreview(project.get('images')?.value[project.get('currentImageIndex')?.value])"
            />

            <button type="button" class="nav-btn" (click)="nextImage(i)">
              ❯
            </button>
          </ng-container>

          <ng-template #noImages>
            <div class="no-images border border-3 rounded p-3 text-center">
              No images available
            </div>
          </ng-template>
        </div>

        <!-- Details -->
        <div class="col-xl-6 col-lg-12 project-details">
          <p>
            {{ project.get("description")?.value }}
          </p>

          <div class="tech-stack">
            <span *ngFor="let tech of project.get('techStack')?.value">
              {{ tech }}
            </span>
          </div>

          <!-- Show links if public -->
          <div class="project-links" *ngIf="project.get('showLinks')?.value; else companyProject">
            <a [href]="project.get('liveUrl')?.value" target="_blank">
              Live Demo
            </a>

            <a [href]="project.get('githubUrl')?.value" target="_blank">
              GitHub
            </a>
          </div>

          <!-- Show badge if company project -->
          <ng-template #companyProject>
            <div class="company-project-badge">
              Company Project
            </div>
          </ng-template>

          <div class="project-badge" *ngIf="project.get('badge')?.value">
            {{ project.get("badge")?.value }}
          </div>

          <ul>
            <li *ngFor="let bullet of project.get('bullets')?.value">
              {{ bullet }}
            </li>
          </ul>
        </div>
      </div>
    </mat-expansion-panel>
  </div>
</form>

<!-- Image Popup Modal -->
<div
  class="image-modal"
  *ngIf="selectedImage"
  (click)="closeImagePreview()"
>
  <img
    [src]="selectedImage"
    class="modal-image"
    (click)="$event.stopPropagation()"
  />
</div>
