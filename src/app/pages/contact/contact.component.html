<form [formGroup]="contactForm" (ngSubmit)="onSubmit()">
  <div class="contact-section">
    <div class="row contact-container">

      <!-- Left Side -->
      <div class="col-xl-6 col-12 contact-info">
        <p class="section-label">{{ f['sectionLabel'].value }}</p>

        <h1>
          {{ f['heading'].value }}
          <span>{{ f['headingHighlight'].value }}</span>
        </h1>

        <p class="contact-description">
          {{ f['description'].value }}
        </p>

        <div class="contact-cards">
          <div class="info-card">
            <i class="ti ti-mail"></i>
            <div class="card-content">
              <h4>Email</h4>
              <p>{{ f['email'].value }}</p>
            </div>
          </div>

          <div class="info-card">
            <i class="ti ti-phone"></i>
            <div class="card-content">
              <h4>Phone</h4>
              <p>{{ f['phone'].value }}</p>
            </div>
          </div>

          <div class="info-card">
            <i class="ti ti-map-pin"></i>
            <div class="card-content">
              <h4>Location</h4>
              <p>{{ f['location'].value }}</p>
            </div>
          </div>
        </div>

        <div class="social-links">
          <a
            [href]="f['githubUrl'].value"
            target="_blank"
            class="social-btn"
          >
            <i class="ti ti-brand-github"></i>
          </a>

          <a
            [href]="f['linkedinUrl'].value"
            target="_blank"
            class="social-btn"
          >
            <i class="ti ti-brand-linkedin"></i>
          </a>
        </div>
      </div>

      <!-- Right Side -->
      <div class="col-xl-6 col-12">
        <div class="contact-form">
          <h2>Send a Message</h2>

          <div class="form-group">
            <input
              type="text"
              formControlName="name"
              placeholder="Your Name"
            />
          </div>

          <div class="form-group">
            <input
              type="email"
              formControlName="senderEmail"
              placeholder="Your Email"
            />
          </div>

          <div class="form-group">
            <input
              type="text"
              formControlName="subject"
              placeholder="Subject"
            />
          </div>

          <div class="form-group">
            <textarea
              rows="5"
              formControlName="message"
              placeholder="Your Message"
            ></textarea>
          </div>

          <button type="submit" class="send-btn">
            Send Message
          </button>
        </div>
      </div>

    </div>
  </div>
</form>
